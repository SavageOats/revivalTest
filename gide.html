<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Гайд</title>
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        .content { background: #d4edda; padding: 2rem; border-radius: 8px; }
    </style>
</head>
<body>
<div class="content">
    <h1>🎮 Гайд по игре</h1>
    <p>Здесь текст вашего гайда, картинки, таблицы – только для участников Discord.</p>
    <p>Спасибо, что вы с нами!</p>
</div>

<script>
    const COOKIE_NAME = 'guide_access';
    function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : null;
    }

    // Если куки нет – кидаем на index.html
    if (getCookie(COOKIE_NAME) !== 'granted') {
        window.location.replace('index.html');
    }
</script>
</body>
</html>
